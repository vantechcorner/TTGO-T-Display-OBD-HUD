; LilyGO TTGO T-Display (ESP32) — Bluetooth Classic ELM327, ST7789 135x240, LVGL 9
[platformio]
default_envs = ttgo_t_display

[env:ttgo_t_display]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; 4MB flash: huge_app ≈3MB app partition (LVGL + BT Classic needs more than default.csv)
board_build.partitions = huge_app.csv

lib_deps =
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@9.4.0

build_flags =
	; Relative to project root (avoid ${...} — breaks ConfigParser / wrong section 'platformio')
	-I include
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_LVGL_H_INCLUDE_SIMPLE
	; Belt-and-suspenders if include path ever fails (defaults: M14=1, M20/M48=0 without lv_conf)
	-D LV_FONT_MONTSERRAT_20=1
	-D LV_FONT_MONTSERRAT_24=1
	-D LV_FONT_MONTSERRAT_48=1
	-D LV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
	-D LV_USE_OBJ_NAME=1
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_WIDTH=135
	-D TFT_HEIGHT=240
	-D TFT_MISO=-1
	-D TFT_MOSI=19
	-D TFT_SCLK=18
	-D TFT_CS=5
	-D TFT_DC=16
	-D TFT_RST=23
	-D TFT_BL=4
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D LOAD_FONT6=1
	-D LOAD_FONT7=1
	-D LOAD_FONT8=1
	-D LOAD_GFXFF=1
	-D SMOOTH_FONT=1
	-D SPI_FREQUENCY=40000000
	-D SPI_READ_FREQUENCY=20000000
	-D TFT_INVERSION_ON
	-D TFT_RGB_ORDER=TFT_BGR
	; ELM327 Bluetooth adapter
	-D OBD_BT_NAME=\"V-LINK\"
	-D OBD_BT_MAC=\"\"
	; Optional: -D OBD_BT_MAC=\"AA:BB:CC:DD:EE:FF\"
	-D BRIDGE_RPM_MS=180
	-D BRIDGE_SPEED_MS=280
	-D BRIDGE_TEMP_MS=8000
	-D BRIDGE_VOLT_MS=2000
	; V1.1: BUTTON1 (GPIO35) cycles backlight (100/50/20%)
	-D HUD_USE_BUTTON_BACKLIGHT=1
	-D HUD_BL_BUTTON_PIN=35
	; Optional: -D HUD_SERIAL_DEBUG_BACKLIGHT
	; Optional: -D HUD_LEDC_WRITE_USES_GPIO_PIN=1
	; Optional: -D HUD_BL_BUTTON_ACTIVE_HIGH=1
	-D BRIDGE_LIGHTS_MS=2000
	-D OBD_LIGHTS_ON_MASK=1
	; BRIDGE_* names are legacy macros in src/main.cpp (OBD PID poll intervals only)
